<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulador · Big Kilo</title>
<style>
  :root { --amber:#d97706; --amber-soft:#fef3c7; --bg:#ece5dd; }
  * { box-sizing:border-box; font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif; }
  body { margin:0; background:#0b141a; display:flex; justify-content:center; }
  .app { width:100%; max-width:460px; height:100vh; display:flex; flex-direction:column; background:var(--bg); }
  header { background:var(--amber); color:#fff; padding:.8rem 1rem; display:flex; align-items:center; gap:.6rem; }
  header .avatar { width:40px; height:40px; border-radius:50%; background:#fff; color:var(--amber); display:flex; align-items:center; justify-content:center; font-size:1.4rem; }
  header h1 { font-size:1rem; margin:0; } header small { opacity:.9; font-size:.75rem; }
  .config { background:#fff8ef; padding:.5rem 1rem; border-bottom:1px solid #eee; font-size:.8rem; display:flex; gap:.5rem; align-items:center; }
  .config input { flex:1; padding:.3rem .5rem; border:1px solid #ddd; border-radius:6px; }
  #chat { flex:1; overflow-y:auto; padding:1rem; display:flex; flex-direction:column; gap:.5rem;
          background-image:linear-gradient(rgba(236,229,221,.92),rgba(236,229,221,.92)); }
  .msg { max-width:80%; padding:.5rem .7rem; border-radius:10px; font-size:.9rem; white-space:pre-wrap; line-height:1.35; box-shadow:0 1px 1px rgba(0,0,0,.08); }
  .bot { background:#fff; align-self:flex-start; border-top-left-radius:2px; }
  .user { background:#dcf8c6; align-self:flex-end; border-top-right-radius:2px; }
  .sys { align-self:center; background:var(--amber-soft); color:#92400e; font-size:.75rem; border-radius:20px; padding:.3rem .8rem; }
  footer { padding:.6rem; background:#f0f0f0; display:flex; gap:.5rem; }
  footer input { flex:1; padding:.6rem .8rem; border:1px solid #ddd; border-radius:20px; font-size:.95rem; }
  footer button { border:none; background:var(--amber); color:#fff; width:44px; border-radius:50%; font-size:1.1rem; cursor:pointer; }
  .actions { display:flex; gap:.5rem; padding:0 .6rem .6rem; }
  .actions button { flex:1; border:none; padding:.5rem; border-radius:8px; cursor:pointer; font-size:.8rem; }
  .pay { background:#16a34a; color:#fff; } .reset { background:#e5e7eb; color:#333; }

  .sm.bot{ display:flex; flex-direction:column; gap:.35rem; max-width:92%; }
  .sim-list{ display:flex; flex-direction:column; gap:.25rem; margin-top:.2rem; }
  .sim-list-btn{ font-size:.72rem; color:#6b7280; font-weight:600; }
  .sim-row,.sim-btns button{ text-align:left; border:1px solid #e5e7eb; background:#f9fafb; border-radius:8px; padding:.4rem .55rem; cursor:pointer; font-size:.78rem; color:#111; }
  .sim-row strong{ display:block; font-size:.82rem; }
  .sim-row small{ display:block; color:#6b7280; font-size:.72rem; margin-top:.1rem; }
  .sim-btns{ display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.25rem; }
  .sim-btns button{ flex:1; min-width:40%; text-align:center; background:#fff7ed; border-color:#fdba74; }

  .sim-multi{ display:flex; flex-direction:column; gap:.25rem; margin-top:.25rem; }
  .sim-multi label{ display:flex; align-items:flex-start; gap:.4rem; font-size:.78rem; padding:.35rem .45rem; border:1px solid #e5e7eb; border-radius:8px; background:#f9fafb; cursor:pointer; }
  .sim-multi label input{ margin-top:.15rem; }
  .sim-multi-ok{ margin-top:.35rem; border:none; background:#d97706; color:#fff; border-radius:8px; padding:.45rem .7rem; cursor:pointer; font-size:.78rem; }

  .sim-pix{ margin-top:.35rem; padding:.55rem; border:1px solid #bbf7d0; background:#f0fdf4; border-radius:10px; font-size:.78rem; }
  .sim-pix .valor{ font-weight:700; color:#166534; margin:.25rem 0; }
  .sim-pix textarea{ width:100%; min-height:52px; font-size:.7rem; margin:.35rem 0; border:1px solid #ddd; border-radius:6px; padding:.3rem; }
  .sim-pix button{ border:none; background:#16a34a; color:#fff; border-radius:8px; padding:.35rem .6rem; cursor:pointer; font-size:.75rem; margin-right:.35rem; }
  .sim-pix small{ color:#6b7280; display:block; margin-top:.25rem; }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="avatar">🍽️</div>
    <div><h1>Big Kilo</h1><small>simulador de atendimento (teste)</small></div>
  </header>
  <div class="config">
    📱 <input id="tel" value="5521999990000" title="Telefone de teste">
  </div>
  <div id="chat"></div>
  <div class="actions">
    <button class="pay" onclick="simPagar()">💸 Simular pagamento PIX</button>
    <button class="reset" onclick="simReset()">↺ Reiniciar</button>
  </div>
  <footer>
    <input id="inp" placeholder="Digite só quando pedir CEP ou endereço…" onkeydown="if(event.key==='Enter')simEnviar()">
    <button onclick="simEnviar()">➤</button>
  </footer>
</div>
<script>
(function(){
  const chat=document.getElementById('chat');
  const tel=()=>document.getElementById('tel').value.trim();
  const PERFIL_ID="";
  function fmtWa(t){ return (t||'').replace(/\*([^*]+)\*/g,'$1'); }
  function add(t,c){ const d=document.createElement('div'); d.className='sm '+c; d.textContent=fmtWa(t); chat.appendChild(d); chat.scrollTop=chat.scrollHeight; }
  function addBot(m){
    if(typeof m==='string') m={tipo:'texto',corpo:m};
    const wrap=document.createElement('div'); wrap.className='sm bot';
    const body=document.createElement('div');
    body.innerHTML=(m.corpo||'').replace(/\*([^*]+)\*/g,'<b>$1</b>').replace(/\n/g,'<br>');
    wrap.appendChild(body);
    if(m.tipo==='lista'){
      const lbl=document.createElement('div'); lbl.className='sim-list-btn'; lbl.textContent='📋 '+(m.botao||'Opções'); wrap.appendChild(lbl);
      const ul=document.createElement('div'); ul.className='sim-list';
      (m.linhas||[]).forEach(row=>{
        const b=document.createElement('button'); b.type='button'; b.className='sim-row';
        b.innerHTML='<strong>'+row.titulo+'</strong>'+(row.descricao?'<small>'+row.descricao+'</small>':'');
        b.onclick=()=>simEscolher(row.id, row.titulo);
        ul.appendChild(b);
      });
      wrap.appendChild(ul);
    }


    if(m.tipo==='pix_order'){
      const box=document.createElement('div'); box.className='sim-pix';
      const sub=(m.subtotal_centavos||0)/100; const tax=(m.taxa_centavos||0)/100;
      box.innerHTML='<div class="valor">Pix pedido #'+m.pedido_id+' — R$ '+sub.toFixed(2).replace('.',',')+'</div>'
        +'<div>Taxa entregador (na entrega): R$ '+tax.toFixed(2).replace('.',',')+'</div>';
      if(m.nativo) box.innerHTML+='<div>📱 No WhatsApp: botão <b>Revisar e pagar</b></div>';
      const ta=document.createElement('textarea'); ta.readOnly=true; ta.value=m.pix_copia_cola||'';
      const cp=document.createElement('button'); cp.type='button'; cp.textContent='Copiar Pix';
      cp.onclick=()=>{ ta.select(); document.execCommand('copy'); cp.textContent='Copiado!'; };
      const sm=document.createElement('small'); sm.textContent='Use o botão "Simular pagamento PIX" abaixo para testar.';
      box.appendChild(ta); box.appendChild(cp); box.appendChild(sm); wrap.appendChild(box);
    }

    if(m.tipo==='multi_select'){
      const box=document.createElement('div'); box.className='sim-multi';
      const picked=new Set();
      (m.opcoes||[]).forEach(op=>{
        const lb=document.createElement('label');
        const cb=document.createElement('input'); cb.type='checkbox'; cb.value=op.id;
        cb.onchange=()=>{ if(cb.checked){ if(picked.size>=(m.maximo||99)){ cb.checked=false; return; } picked.add(op.id);} else picked.delete(op.id); };
        lb.appendChild(cb);
        const sp=document.createElement('span'); sp.textContent=op.titulo+(op.descricao?(' — '+op.descricao):''); lb.appendChild(sp);
        box.appendChild(lb);
      });
      const ok=document.createElement('button'); ok.type='button'; ok.className='sim-multi-ok'; ok.textContent=m.botao||'Confirmar';
      ok.onclick=()=>{
        const min=m.minimo||1; if(picked.size<min){ alert('Escolha pelo menos '+min+' opção(ões).'); return; }
        simEscolher(Array.from(picked).join(','), (m.botao||'Confirmar')+' ('+picked.size+')', true);
      };
      box.appendChild(ok); wrap.appendChild(box);
    }

    if(m.tipo==='botoes'){
      const bar=document.createElement('div'); bar.className='sim-btns';
      (m.opcoes||[]).forEach(op=>{
        const b=document.createElement('button'); b.type='button'; b.textContent=op.titulo;
        b.onclick=()=>simEscolher(op.id, op.titulo);
        bar.appendChild(b);
      });
      wrap.appendChild(bar);
    }
    chat.appendChild(wrap); chat.scrollTop=chat.scrollHeight;
  }
  async function post(u,b){ b.perfil_id=PERFIL_ID; const r=await fetch(u,{method:'POST',headers:{'Content-Type':'application/json','X-CSRFToken':csrf},body:JSON.stringify(b)}); return r.json(); }
  window.simEscolher=async(id,label,multi)=>{ add(label||id,'user'); const txt=multi?('multi:'+id):String(id); const d=await post('/simulador/msg/',{telefone:tel(),texto:txt}); (d.mensagens||[]).forEach(m=>addBot(m)); };
  window.enviar = window.simEnviar=async()=>{ const i=document.getElementById('inp'); const t=i.value.trim(); if(!t)return; add(t,'user'); i.value='';
    const d=await post('/simulador/msg/',{telefone:tel(),texto:t}); (d.mensagens||[]).forEach(m=>addBot(m)); };
  window.pagar = window.simPagar=async()=>{ const d=await post('/simulador/pagar/',{telefone:tel()});
    if(d.ok){ add('💸 Pagamento PIX simulado (pedido #'+d.pedido+')','sys'); addBot({tipo:'texto',corpo:d.mensagem}); add('🖨️ Comanda impressa na cozinha','sys'); }
    else add(d.erro||'Nada para pagar.','sys'); };
  window.reiniciar = window.simReset=async()=>{ const d=await post('/simulador/reset/',{telefone:tel()}); chat.innerHTML=''; add('Conversa reiniciada','sys'); (d.mensagens||[]).forEach(m=>addBot(m)); };
  (async()=>{ const d=await post('/simulador/reset/',{telefone:tel()}); (d.mensagens||[]).forEach(m=>addBot(m)); })();
})();

</script>

</body>
</html>
