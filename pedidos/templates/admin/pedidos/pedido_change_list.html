{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}
<script>
  // Auto-refresh do painel de pedidos a cada 20s.
  // Pausa enquanto o lojista está digitando/editando algo (foco em input/select)
  // para não perder alterações não salvas.
  (function () {
    const INTERVALO_MS = 45000;
    setInterval(function () {
      const tag = document.activeElement ? document.activeElement.tagName : "";
      if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;
      if (document.querySelector('[id$="Overlay"].open')) return;
      window.location.reload();
    }, INTERVALO_MS);
  })();
</script>
{% endblock %}
